experiment:
  name: teacher_bge_base_msmarco_mini
  output_dir: results/runs
  seed: 13

model:
  encoder_name: BAAI/bge-base-en-v1.5
  pooling: mean
  normalize: true

data:
  train_path: data/msmarco/train_triples.tsv
  max_train_examples: 100000
  val_examples: 5000
  text_max_length: 256
  query_prefix: ""
  passage_prefix: ""

training:
  num_epochs: 1
  batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accumulation_steps: 1
  log_every_steps: 10
  eval_every_steps: 200
  max_grad_norm: 1.0
  num_workers: 0
  mixed_precision: false
  device: auto
