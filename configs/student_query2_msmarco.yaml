experiment:
  name: student_bge_query2_msmarco
  output_dir: results/runs
  seed: 13

model:
  encoder_name: BAAI/bge-base-en-v1.5
  architecture: asymmetric
  pooling: cls
  normalize: true
  query_num_hidden_layers: 2
  freeze_document_encoder: true

data:
  train_path: data/msmarco/train_triples.tsv
  max_train_examples: 100000
  val_examples: 5000
  text_max_length: 256
  query_prefix: "Represent this sentence for searching relevant passages: "
  passage_prefix: ""

training:
  num_epochs: 1
  batch_size: 16
  learning_rate: 5.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_accumulation_steps: 1
  log_every_steps: 10
  eval_every_steps: 250
  max_grad_norm: 1.0
  num_workers: 0
  mixed_precision: false
  device: auto
  max_steps: 1500
  best_checkpoint_metric: retrieval_mrr_at_10

retrieval:
  enabled: true
  corpus_path: data/msmarco/corpus.tsv
  query_path: data/msmarco/dev_queries.tsv
  qrels_path: data/msmarco/dev_qrels.tsv
  batch_size: 64
  top_k: 100
  save_embeddings: false
  selection:
    enabled: true
    query_limit: 100
    corpus_size: 5000
    top_k: 100
    patience: 2
  latency:
    enabled: true
    warmup_queries: 20
    measured_queries: 100
    query_batch_size: 1
    search_top_k: 100
